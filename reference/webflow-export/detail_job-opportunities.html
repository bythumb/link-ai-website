  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const lenis = new Lenis({
      lerp: 0.2,
      smoothWheel: true,
      wheelMultiplier: 0.7,
      gestureOrientation: 'vertical',
      normalizeWheel: false,
      smoothTouch: false
    });
    function raf(time) {
      lenis.raf(time);
      requestAnimationFrame(raf);
    }
    requestAnimationFrame(raf);
    document.querySelectorAll("[data-lenis-start]").forEach(el => {
      el.addEventListener("click", () => lenis.start());
    });
    document.querySelectorAll("[data-lenis-stop]").forEach(el => {
      el.addEventListener("click", () => lenis.stop());
    });
    document.querySelectorAll("[data-lenis-toggle]").forEach(el => {
      el.addEventListener("click", function() {
        this.classList.toggle("stop-scroll");
        if (this.classList.contains("stop-scroll")) {
          lenis.stop();
        } else {
          lenis.start();
        }
      });
    });
  });
</script>

  <script>
//open first dropdown on mobile 
document.addEventListener("DOMContentLoaded", function () {
  const tabWrappers = document.querySelectorAll('.tabs-drop-wrap');
  tabWrappers.forEach(wrapper => {
    const firstDropTab = wrapper.querySelector('.drop-tabs');
    if (firstDropTab) {
      const toggle = firstDropTab.querySelector('.drop-tabs-togle');
      const list = firstDropTab.querySelector('.drop-tabs-list');
      if (toggle && list) {
        toggle.classList.add('w--open');
        list.classList.add('w--open');
        list.style.height = 'auto';
        list.style.opacity = '1';
      }
    }
  });
});
</script>
